version: '3.8'

services:
  # Aplicação Laravel - Desenvolvimento
  app:
    build:
      context: ../../
      dockerfile: Dockerfile.dev
    container_name: planeta-boy-app-dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../../:/var/www/html
      - vendor:/var/www/html/vendor
    env_file:
      - ./.env
    environment:
      - VITE_URL=http://187.77.36.12:5173
    ports:
      - "127.0.0.1:9000:9000"
    networks:
      - planeta-boy-dev-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # Nginx - Desenvolvimento
  nginx:
    image: nginx:alpine
    container_name: planeta-boy-nginx-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ../../:/var/www/html
      - ../../nginx.conf:/etc/nginx/nginx.conf
    networks:
      - planeta-boy-dev-network
    depends_on:
      - app

  # MySQL - Desenvolvimento
  mysql:
    image: mysql:8.0
    container_name: planeta-boy-mysql-dev
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=planeta_boy
      - MYSQL_USER=planeta_user
      - MYSQL_PASSWORD=planeta_password
    ports:
      - "127.0.0.1:3308:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - planeta-boy-dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Desenvolvimento
  redis:
    image: redis:7-alpine
    container_name: planeta-boy-redis-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - planeta-boy-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vite - Desenvolvimento com hot reload
  vite:
    build:
      context: ../../
      dockerfile: Dockerfile.dev
    container_name: planeta-boy-vite-dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../../:/var/www/html
      - node_modules:/var/www/html/node_modules
    env_file:
      - ./.env
    environment:
      - NODE_ENV=development
      - VITE_URL=http://187.77.36.12:5173
    ports:
      - "127.0.0.1:5173:5173"
    command: npm run dev -- --host 0.0.0.0
    networks:
      - planeta-boy-dev-network

networks:
  planeta-boy-dev-network:
    driver: bridge

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  vendor:
    driver: local
  node_modules:
    driver: local
